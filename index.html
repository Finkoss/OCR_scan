<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OCR Scanner</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { margin-bottom: 20px; }
    #preview img {
      max-width: 100%;
      max-height: 400px;
      margin-top: 16px;
      display: none;
      border: 1px solid #ccc;
    }
    #status {
      margin-top: 12px;
      color: #555;
      min-height: 1.2em;
    }
    #status.error { color: #c00; }
    #result {
      margin-top: 16px;
      padding: 12px;
      background: #f5f5f5;
      border: 1px solid #ddd;
      white-space: pre-wrap;
      word-break: break-word;
      min-height: 60px;
    }
  </style>
</head>
<body>
  <h1>OCR Scanner</h1>
  <input type="file" accept="image/*" id="fileInput">
  <div id="preview"><img id="previewImg" alt="Náhled"></div>
  <div id="status"></div>
  <pre id="result"></pre>

  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
